name: Mirror to amsc2 GitLab

# Push-mirror ORNL/flowcept → the amsc2 GitLab mirror so its GitLab CI (.gitlab-ci.yml)
# builds and pushes the service image to AmSC's ECR. This is the free alternative to GitLab
# pull-mirroring (which requires GitLab Premium). GitHub stays the authoritative source
# (per AmSC RFC §556: the authoritative copy must live in AmSC GitLab, which this keeps in sync).
#
# Trigger: only when a PR **into `main`** is **merged** (not on every push, and not on PRs that
# are closed without merging). The merged `main` is force-pushed onto GitLab `main` (destination
# configurable via AMSC_GITLAB_MIRROR_BRANCH, default `main`); GitLab then runs `.gitlab-ci.yml`.
#
# NOTE: direct pushes to `main` (e.g. the release-bot version bump in create-release-n-publish.yml)
# and pushes to other branches do NOT trigger this — only merged PRs into `main`.
#
# Config (Settings → Secrets and variables → Actions):
#   - variable AMSC_GITLAB_MIRROR_URL  = gitlab.com/amsc2/ai-services/intelligent-interfaces/flowcept.git
#                                        (no scheme, no creds)
#   - variable AMSC_GITLAB_MIRROR_BRANCH = main   (optional; destination branch on GitLab, default main)
#   - secret   AMSC_GITLAB_MIRROR_TOKEN = a GitLab token with `write_repository` on the mirror project
#                                        (Project Access Token or PAT — not a Deploy Token)

on:
  pull_request:
    branches: [ main ]     # PR base branch — i.e. PRs targeting main
    types: [ closed ]

# Avoid overlapping mirror pushes racing each other.
concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    if: github.event.pull_request.merged == true   # merged only, not just closed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}   # the real merged `main`, not the PR merge ref
          fetch-depth: 0                                    # full history + tags for a faithful mirror

      - name: Push main → GitLab ${{ vars.AMSC_GITLAB_MIRROR_BRANCH || 'main' }} (+ tags)
        env:
          AMSC_GITLAB_MIRROR_URL: ${{ vars.AMSC_GITLAB_MIRROR_URL }}
          AMSC_GITLAB_MIRROR_TOKEN: ${{ secrets.AMSC_GITLAB_MIRROR_TOKEN }}
          AMSC_GITLAB_MIRROR_BRANCH: ${{ vars.AMSC_GITLAB_MIRROR_BRANCH || 'main' }}
        run: |
          if [ -z "$AMSC_GITLAB_MIRROR_URL" ] || [ -z "$AMSC_GITLAB_MIRROR_TOKEN" ]; then
            echo "AMSC_GITLAB_MIRROR_URL (variable) and AMSC_GITLAB_MIRROR_TOKEN (secret) must be set."; exit 1
          fi
          DEST="${AMSC_GITLAB_MIRROR_BRANCH:-main}"
          echo "Mirroring merged GitHub main → GitLab ${DEST}"
          # HEAD is the checked-out merged `main`; force-push it onto the GitLab dest branch.
          git push "https://oauth2:${AMSC_GITLAB_MIRROR_TOKEN}@${AMSC_GITLAB_MIRROR_URL}" \
            "+HEAD:refs/heads/${DEST}" \
            "+refs/tags/*:refs/tags/*"
