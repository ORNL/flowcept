name: Mirror to amsc2 GitLab

# Push-mirror ORNL/flowcept → the amsc2 GitLab mirror so its GitLab CI (.gitlab-ci.yml)
# builds and pushes the service image to AmSC's ECR. This is the free alternative to GitLab
# pull-mirroring (which requires GitLab Premium). GitHub stays the authoritative source
# (per AmSC RFC §556: the authoritative copy must live in AmSC GitLab, which this keeps in sync).
#
# Mapping: pushes to GitHub `main` OR `fc_ui` are force-pushed onto GitLab `main` (the destination
# is configurable via AMSC_GITLAB_MIRROR_BRANCH, default `main`). GitLab's build pipeline and the OIDC
# trust are main-only, so mapping both source branches onto `main` is what makes them build.
# Both the SOURCE branches and the DESTINATION branch are configurable via repo variables.
# GitHub Actions can't use variables in `on:`, so we trigger on all branch pushes and gate the
# job with an `if:` that reads AMSC_GITLAB_MIRROR_SOURCE_BRANCHES (a JSON array). Pushes to other
# branches start and immediately skip. Since all sources map to one GitLab branch, GitLab `main`
# reflects whichever source branch was pushed last.
#
# Config (Settings → Secrets and variables → Actions):
#   - variable AMSC_GITLAB_MIRROR_URL  = gitlab.com/amsc2/ai-services/intelligent-interfaces/flowcept.git
#                                        (no scheme, no creds)
#   - variable AMSC_GITLAB_MIRROR_SOURCE_BRANCHES = ["main","fc_ui"]   (JSON array of GitHub source
#                                        branches to mirror; default is ["main"] when unset)
#   - variable AMSC_GITLAB_MIRROR_BRANCH = main   (optional; destination branch on GitLab, default main)
#   - secret   AMSC_GITLAB_MIRROR_TOKEN = a GitLab token with `write_repository` on the mirror project
#                                        (Project Access Token or PAT — not a Deploy Token)

on:
  push:
    branches: [ '**' ]   # can't be a variable; the job `if:` below is the real (var-driven) filter

# Avoid overlapping mirror pushes racing each other.
concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    # Source-branch allowlist, driven by a repo variable (JSON array); defaults to ["main"].
    if: contains(fromJSON(vars.AMSC_GITLAB_MIRROR_SOURCE_BRANCHES || '["main"]'), github.ref_name)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history + tags for a faithful mirror

      - name: Push ${{ github.ref_name }} → GitLab ${{ vars.AMSC_GITLAB_MIRROR_BRANCH || 'main' }} (+ tags)
        env:
          AMSC_GITLAB_MIRROR_URL: ${{ vars.AMSC_GITLAB_MIRROR_URL }}
          AMSC_GITLAB_MIRROR_TOKEN: ${{ secrets.AMSC_GITLAB_MIRROR_TOKEN }}
          AMSC_GITLAB_MIRROR_BRANCH: ${{ vars.AMSC_GITLAB_MIRROR_BRANCH || 'main' }}
        run: |
          if [ -z "$AMSC_GITLAB_MIRROR_URL" ] || [ -z "$AMSC_GITLAB_MIRROR_TOKEN" ]; then
            echo "AMSC_GITLAB_MIRROR_URL (variable) and AMSC_GITLAB_MIRROR_TOKEN (secret) must be set."; exit 1
          fi
          DEST="${AMSC_GITLAB_MIRROR_BRANCH:-main}"
          echo "Mirroring GitHub ${GITHUB_REF_NAME} → GitLab ${DEST}"
          # HEAD is the pushed commit (from main or fc_ui); force-push it onto the GitLab dest branch.
          git push "https://oauth2:${AMSC_GITLAB_MIRROR_TOKEN}@${AMSC_GITLAB_MIRROR_URL}" \
            "+HEAD:refs/heads/${DEST}" \
            "+refs/tags/*:refs/tags/*"
